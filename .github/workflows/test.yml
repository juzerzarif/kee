name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
      - run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run Tests
        run: pnpm run "/test:/"

      - name: Build
        run: pnpm run "/build:/"
